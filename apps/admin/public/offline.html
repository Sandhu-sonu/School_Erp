<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | School ERP</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #0B1220;
      color: #F8FAFC;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .container {
      max-width: 400px;
      padding: 20px;
    }
    h1 {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: -0.025em;
    }
    p {
      color: #94A3B8;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    button {
      background-color: #2563EB;
      color: #FFFFFF;
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #1D4ED8;
    }
  </style>
</head>
<body>
  <div class="container">
    <div style="font-size: 48px; margin-bottom: 16px;">🔴</div>
    <h1>No Connection</h1>
    <p>Please check your internet settings. You can still inspect cached scores and transactions once connected.</p>
    <button onclick="window.location.reload()">Retry Connection</button>
  </div>
</body>
</html>
